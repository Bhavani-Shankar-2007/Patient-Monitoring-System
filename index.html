<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕷️ SpiderAdhere - Patient Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="spider-bg"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">
                🕷️ <span class="text-white">SpiderAdhere</span>
            </a>
            <span class="navbar-text text-white-50">
                Patient Adherence Monitoring Platform
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Patient List -->
            <div class="col-md-4">
                <div class="card h-100 shadow-lg border-0">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0"><i class="fas fa-users"></i> Patients</h5>
                    </div>
                    <div class="card-body p-0" id="patientList">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Patient Detail + Log -->
            <div class="col-md-8">
                <div class="card shadow-lg border-0" id="patientDetailCard">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0" id="patientName">Select a Patient</h4>
                    </div>
                    <div class="card-body" id="patientDetail">
                        <p class="text-muted text-center py-5">🕸️ Click on a patient from the list to begin monitoring</p>
                    </div>
                </div>

                <!-- Log New Data -->
                <div class="card shadow-lg mt-3 border-0">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="fas fa-edit"></i> Log New Data</h5>
                    </div>
                    <div class="card-body" id="logForm">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- AI Intervention -->
                <div class="card shadow-lg mt-3 border-0">
                    <div class="card-header bg-success text-white d-flex justify-content-between">
                        <h5 class="mb-0"><i class="fas fa-robot"></i> Generate AI Intervention Strategies</h5>
                        <button onclick="generateIntervention()" class="btn btn-light btn-sm">
                            <i class="fas fa-magic"></i> Generate
                        </button>
                    </div>
                    <div class="card-body" id="interventionResult">
                        <p class="text-muted text-center py-4">Select a patient and click "Generate" to get AI-powered strategies</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
